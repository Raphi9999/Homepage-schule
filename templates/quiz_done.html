{% extends "index.html" %}

{% block content %}
<div class="main-content">
    <div class="blocksatz">
        <h1><b>Quiz</b></h1>
        <h2>Vielen Dank für's Spielen, <b>{{ username }}</b>. Du hast <b>{{pts}}</b> von 5 Punkten erreicht!</h2><br>

        <h1>Leaderboard</h1>

        <table class="table table-striped table-bordered" style="overflow: hidden; border-radius: 6px;">
        <thead>
            <tr>
                <th scope="col">Platzierung</th>
                <th scope="col">Name</th>
                <th scope="col">Punkte</th>
            </tr>
        </thead>
        <tbody>
            {% for obj in leaderboard %}
            <tr>
                <th scope="row">{{loop.index}}</th>
                <td>{{obj.username}}</td>
                <td>{{obj.pts}}</td>
            </tr>
            {% endfor %}
        </tbody>
        </table>
        
    </div>
</div>
{% endblock %}
